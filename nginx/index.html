<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page | Antigravity</title>
    <meta name="description" content="A premium playground for testing UI components and functionality.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --bg-card: #16161a;
            --accent-primary: #6366f1;
            --accent-secondary: #a855f7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Ambient Background Shadows */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .ambient-circle {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        .circle-1 {
            background: var(--accent-primary);
            top: -100px;
            left: -100px;
        }

        .circle-2 {
            background: var(--accent-secondary);
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.1); }
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px border var(--border);
            border-radius: 24px;
            padding: 3rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .test-btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-muted);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.5rem 1rem;
            border-radius: 100px;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 0.75rem;
            box-shadow: 0 0 10px #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.875rem 1rem;
            color: white;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        input:focus {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 640px) {
            h1 { font-size: 2.5rem; }
            body { padding: 1rem; }
            .card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="ambient-bg">
        <div class="ambient-circle circle-1"></div>
        <div class="ambient-circle circle-2"></div>
    </div>

    <div class="container">
        <div class="status-badge">
            <span class="status-dot"></span>
            System Ready for Testing
        </div>

        <h1>Test Arena</h1>
        <p>Environment for validating components, scripts, and layouts.</p>

        <div class="card">
            <div class="input-group">
                <label for="test-input">Sanity Check Input</label>
                <input type="text" id="test-input" placeholder="Type something to test interactivity...">
            </div>

            <div class="grid">
                <button class="test-btn btn-primary" onclick="alert('Primary functionality active.')">Primary Action</button>
                <button class="test-btn btn-outline" onclick="console.log('Secondary action logged.')">Outline Action</button>
            </div>

            <div id="result-area" style="margin-top: 2rem; font-size: 0.875rem; color: var(--text-muted);">
                <!-- Test results can be injected here -->
            </div>
        </div>

        <footer style="margin-top: 4rem; font-size: 0.875rem; color: var(--text-muted);">
            &copy; 2026 Antigravity Test Environment. Build 1.0.4
        </footer>
    </div>

    <script>
        // Interactive listener for real-time testing
        const input = document.getElementById('test-input');
        const result = document.getElementById('result-area');

        input.addEventListener('input', (e) => {
            if (e.target.value) {
                result.textContent = `Input length: ${e.target.value.length} characters`;
            } else {
                result.textContent = '';
            }
        });
    </script>
</body>
</html>
